benchmark: ovo
policy: streamtext
result_output: outputs/streamtext/ovo_qwen3vl8b_8gpu_1of8/results.jsonl

prompt:
  profile: text_memory_eval

postprocess:
  mode: eval_repair

reward:
  enable_format_reward: true
  enable_timing_reward: true
  enable_open_tail_reward: false

memory:
  window_seconds: 120.0

runtime:
  sample_fps: 1.0
  frames_per_step: 5
  max_frames: 0
  max_steps: 0
  resolution: 768

dataset:
  dataset_root: dataset
  dataset_name: ovo
  video_root: /mmu_mllm_hdd/zhouhanshu/test/OVO-Bench/chunked_videos
  frame_id_base: 0
  image_ext: jpg
  jpeg_quality: 95
  overwrite_frames: false

backend:
  backend: vllm
  model: /mmu_mllm_hdd/Models/Qwen3-VL-8B-Instruct
  base_url: http://127.0.0.1:8000/v1
  api_key: EMPTY
  api_key_env: ""
  max_tokens: 2048
  temperature: 0.0
  timeout_seconds: 120.0
  image_quality: 85
  max_retries: 2
  retry_backoff_seconds: 1.0
  retry_backoff_multiplier: 2.0

trace:
  output_root: outputs/streamtext/ovo_qwen3vl8b_8gpu_1of8/traces
  experiment_name: ""
  write_jsonl: true

benchmark_args:
  anno_path: /mmu_mllm_hdd/zhouhanshu/test/OVO-Bench/OVO-Bench/data/ovo_bench_1of8_stratified.json
  video_dir: /mmu_mllm_hdd/zhouhanshu/test/OVO-Bench/chunked_videos
  sample_ids: []
  task: ""
  limit: 0

batch:
  workers: 16
  endpoints:
    - http://127.0.0.1:8000/v1
    - http://127.0.0.1:8001/v1
    - http://127.0.0.1:8002/v1
    - http://127.0.0.1:8003/v1
    - http://127.0.0.1:8004/v1
    - http://127.0.0.1:8005/v1
    - http://127.0.0.1:8006/v1
    - http://127.0.0.1:8007/v1
  limit: 0
  output: outputs/streamtext/ovo_qwen3vl8b_8gpu_1of8/results.jsonl
  worker_log_dir: outputs/streamtext/ovo_qwen3vl8b_8gpu_1of8/worker_logs
