benchmark: videohallucer
policy: streamweave         # = anchor + delta (image-text interleaved memory)

prompt:
  profile: eval

postprocess:
  mode: eval_repair

reward:
  enable_format_reward: true
  enable_timing_reward: true
  enable_open_tail_reward: true

synthesis:
  max_attempts: 3

memory:
  window_seconds: 120.0

runtime:
  sample_fps: 1.0
  frames_per_step: 5
  max_frames: 0
  max_steps: 0
  resolution: 768

dataset:
  dataset_root: /mmu_mllm_hdd/zhouhanshu/test/exp3/streamweave_v5/dataset3
  dataset_name: videohallucer
  video_root: /mmu_mllm_hdd/zhouhanshu/test/exp3/streamweave_v5/dataset3/raw/videohallucer
  frame_id_base: 0
  image_ext: jpg
  jpeg_quality: 95
  overwrite_frames: false

backend:
  backend: mock
  model: mock
  base_url: http://127.0.0.1:8000/v1
  api_key_env: OPENAI_API_KEY
  max_tokens: 1024
  temperature: 0.0
  timeout_seconds: 120.0
  image_quality: 85
  max_retries: 2
  retry_backoff_seconds: 1.0
  retry_backoff_multiplier: 2.0

trace:
  output_root: /mmu_mllm_hdd/zhouhanshu/test/exp3/streamweave_v5/dataset3/outputs
  experiment_name: vh_anchor_delta_mock
  write_jsonl: true

benchmark_args:
  json_path: /mmu_mllm_hdd/zhouhanshu/test/exp3/streamweave_v5/dataset3/videohallucer/videohallucer.json
  video_root: /mmu_mllm_hdd/zhouhanshu/test/exp3/streamweave_v5/dataset3/raw/videohallucer
  sample_ids: []
  task: ""
  limit: 0
